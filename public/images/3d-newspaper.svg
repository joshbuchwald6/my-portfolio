<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Base newspaper -->
  <rect x="2" y="4" width="16" height="16" rx="1" fill="#E9E9E9" />
  <rect x="2" y="4" width="16" height="16" rx="1" stroke="#6B7280" stroke-width="1" />
  
  <!-- Front newspaper -->
  <rect x="4" y="2" width="16" height="16" rx="1" fill="#FFFFFF" />
  <rect x="4" y="2" width="16" height="16" rx="1" stroke="#6B7280" stroke-width="1" />
  
  <!-- Newspaper content -->
  <rect x="6" y="4" width="12" height="2" fill="#6B7280" />
  <rect x="6" y="7" width="8" height="1" fill="#D1D5DB" />
  <rect x="6" y="9" width="10" height="1" fill="#D1D5DB" />
  <rect x="6" y="11" width="7" height="1" fill="#D1D5DB" />
  <rect x="6" y="13" width="9" height="1" fill="#D1D5DB" />
  <rect x="6" y="15" width="6" height="1" fill="#D1D5DB" />
  
  <!-- Newspaper image -->
  <rect x="15" y="7" width="3" height="5" fill="#F472B6" opacity="0.7" />
</svg> 